<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Bus Tracker - Live View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Google Fonts: Inter for Professional Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        academic: {
                            50: '#f8fafc',  // Slate 50
                            100: '#f1f5f9', // Slate 100
                            200: '#e2e8f0', // Slate 200
                            300: '#cbd5e1', // Slate 300
                            400: '#94a3b8', // Slate 400
                            500: '#64748b', // Slate 500
                            600: '#475569', // Slate 600
                            700: '#334155', // Slate 700
                            800: '#1e293b', // Slate 800
                            900: '#0f172a', // Slate 900
                        },
                        brand: {
                            blue: '#1e3a8a', // Dark Academic Blue
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 0;
        }

        /* Glassmorphism for floating panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        /* Pretty Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden bg-academic-50 text-academic-900">

    <!-- Professional Navbar -->
    <header
        class="h-16 bg-white border-b border-academic-200 flex items-center justify-between px-6 z-20 shadow-sm relative">
        <div class="flex items-center gap-4">
            <div class="h-10 w-auto flex items-center justify-center">
                <!-- Preserving logo path -->
                <img src="vignan-logo.png" alt="Vignan Logo" class="h-10 w-auto object-contain">
            </div>
            <div class="hidden sm:block">
                <h1 class="text-lg font-bold text-academic-900 leading-tight tracking-tight">VFSTRH-TRANSPORT
                <p class="text-[11px] text-academic-500 font-medium uppercase tracking-wider">Live Bus Tracking System
                </p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center px-3 py-1.5 bg-green-50 rounded-full border border-green-100">
                <span class="relative flex h-2 w-2 mr-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-xs font-semibold text-green-700">System Online</span> 
            </div>
            <div class="text-xs text-academic-400 font-mono" id="clock">--:--</div>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-1 relative w-full h-full">

        <!-- Interactive Map (Dominant View) -->
        <div id="map"></div>

        <!-- Floating Left Sidebar (Minimal) -->
        <aside
            class="absolute top-4 left-4 w-80 max-h-[calc(100vh-7rem)] flex flex-col gap-3 z-[1000] pointer-events-none transition-all duration-300">

            <!-- Connection & Controls Card -->
            <div class="glass-panel rounded-xl p-4 shadow-xl pointer-events-auto">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xs font-bold text-academic-500 uppercase tracking-widest">Connection Status</h2>
                    <div id="connection-status"
                        class="flex items-center px-2 py-1 rounded-full bg-academic-100 border border-academic-200">
                        <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full mr-1.5"></span>
                        <span class="text-[10px] font-semibold text-academic-600">Connecting...</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="centerMap()"
                        class="flex-1 bg-academic-900 hover:bg-academic-800 text-white text-xs font-bold py-2.5 px-3 rounded-lg transition shadow-md flex items-center justify-center gap-2">
                        <span>target</span> Center Maps
                    </button>
                    <button onclick="refreshTracking()"
                        class="flex-1 bg-white hover:bg-academic-50 text-academic-700 border border-academic-200 text-xs font-bold py-2.5 px-3 rounded-lg transition shadow-sm">
                        Refresh
                    </button>
                </div>
            </div>

            <!-- Bus List Card -->
            <div
                class="glass-panel rounded-xl shadow-xl flex-1 overflow-hidden flex flex-col pointer-events-auto min-h-[150px]">
                <div class="p-4 border-b border-academic-200 bg-white/40">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-sm font-bold text-academic-800 flex items-center gap-2">
                            Active Fleet
                            <span id="active-count"
                                class="bg-academic-100 text-academic-600 text-[10px] px-1.5 py-0.5 rounded border border-academic-200">0</span>
                        </h2>
                    </div>
                    <div>
                        <select id="bus-select"
                            class="w-full text-xs p-2.5 bg-white border border-academic-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-academic-200 text-academic-700 font-medium shadow-sm">
                            <option value="">Select specific bus to track...</option>
                        </select>
                    </div>
                </div>

                <div id="bus-list" class="overflow-y-auto p-3 space-y-2 max-h-[400px]">
                    <!-- Placeholder -->
                    <div class="text-center py-8">
                        <div class="inline-block p-3 rounded-full bg-academic-50 mb-2">
                            <span class="text-2xl">🚌</span>
                        </div>
                        <p class="text-xs text-academic-500 font-medium">Waiting for bus data...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Rights Side Actions -->
        <div class="absolute bottom-6 right-6 flex flex-col gap-3 z-[1000] pointer-events-auto">
            <div class="glass-panel rounded-lg p-3 mb-2 max-w-xs shadow-lg hidden md:block">
                <h3 class="font-bold text-academic-800 text-xs mb-1">Live Tracking Active</h3>
                <p class="text-[10px] text-academic-500 leading-relaxed">Map updates location real-time. Click any bus
                    icon for details.</p>
            </div>

            <button id="show-location-btn" title="Show My Location"
                class="h-12 w-12 bg-white rounded-full shadow-xl border border-academic-100 flex items-center justify-center text-academic-700 hover:bg-academic-50 hover:text-brand-blue hover:scale-105 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- UI Helper: Clock ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Core Application Logic ---

        // Initialize map
        const map = L.map('map', {
            zoomControl: false // We will add it back in a better position if needed, or stick to default
        }).setView([17.4065, 78.4772], 16); // Hyderabad default

        // Move zoom control to top-right
        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // Map Tile Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'VFSTR Bus Tracker',
            maxZoom: 20
        }).addTo(map);

        // Custom bus icon
        const busIcon = L.divIcon({
            className: 'custom-bus-icon',
            // More professional marker
            html: `<div style="
                background: #1e3a8a; 
                border: 2px solid white; 
                border-radius: 50%; 
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
                width: 40px; 
                height: 40px; 
                display: flex; 
                align-items: center; 
                justify-content: center;
                color: white;
                font-size: 20px;
            ">🚌</div>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        // College marker icon
        const clgIcon = L.icon({
            iconUrl: 'clg.png',
            iconSize: [48, 48],
            iconAnchor: [24, 48],
            popupAnchor: [0, -48]
        });

        // Add college marker
        const clgMarker = L.marker([17.3444158, 78.716655], { icon: clgIcon }).addTo(map);
        clgMarker.bindPopup('<div class="p-2 text-sm font-sans"><b>VFSTR</b><br>Foundation for Science, Technology & Research</div>');

        // State Management
        const busMarkers = {};
        let allBuses = {};
        let selectedBusId = "";

        // Route 3 data
        const route3Stops = [
            { name: "Dsnr1", lat: 17.368694, lng: 78.526333 },
            { name: "Dsnr2", lat: 17.368583, lng: 78.530472 },
            { name: "Chaitanyapuri", lat: 17.368583, lng: 78.530472 },
            { name: "Kothapet", lat: 17.366972, lng: 78.541028 },
            { name: "Victoria Memorial", lat: 17.362694, lng: 78.543833 },
            { name: "Lb nagar", lat: 17.349361, lng: 78.548444 },
            { name: "Chinchalkunta", lat: 17.342417, lng: 78.557250 },
            { name: "Art Cinemas", lat: 17.338722, lng: 78.567806 },
            { name: "Hayath nagar", lat: 17.327139, lng: 78.604472 },
            { name: "Abdullahpurmet", lat: 17.311944, lng: 78.687194 }
        ];

        // Add Route 3 stop markers (Smaller, cleaner)
        route3Stops.forEach(stop => {
            L.circleMarker([stop.lat, stop.lng], {
                radius: 4,
                fillColor: "#64748b",
                color: "#fff",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<span class="text-xs font-bold text-academic-700">${stop.name}</span>`);
        });

        // Routing Machine (hidden but functional for path)
        if (window.L && window.L.Routing) {
            L.Routing.control({
                waypoints: route3Stops.map(stop => L.latLng(stop.lat, stop.lng)),
                routeWhileDragging: false,
                addWaypoints: false,
                draggableWaypoints: false,
                fitSelectedRoutes: true,
                show: false,
                lineOptions: { styles: [{ color: '#3b82f6', weight: 4, opacity: 0.6 }] }
            }).addTo(map);
        }

        // Socket.IO Handling
        let socket;

        function connectToServer() {
            socket = io('http://localhost:3000');

            socket.on('connect', () => updateConnectionStatus(true));
            socket.on('disconnect', () => updateConnectionStatus(false));

            socket.on('initialLocations', (data) => {
                console.log('Received initial locations:', data);
                allBuses = { ...data };
                renderBuses();
            });

            socket.on('busLocation', (data) => {
                if (Array.isArray(data)) {
                    data.forEach(bus => allBuses[bus.busId] = bus);
                } else {
                    allBuses[data.busId] = data;
                }
                renderBuses();
            });
        }

        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connection-status');
            if (connected) {
                statusEl.className = "flex items-center px-2 py-1 rounded-full bg-green-50 border border-green-200 transition-colors duration-300";
                statusEl.innerHTML = `
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 status-dot"></span>
                    <span class="text-[10px] font-semibold text-green-700">Online</span>
                `;
            } else {
                statusEl.className = "flex items-center px-2 py-1 rounded-full bg-red-50 border border-red-200 transition-colors duration-300";
                statusEl.innerHTML = `
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-1.5"></span>
                    <span class="text-[10px] font-semibold text-red-700">Offline</span>
                `;
            }
        }

        function renderBuses() {
            const busSelect = document.getElementById('bus-select');
            const busListEl = document.getElementById('bus-list');
            const activeCountEl = document.getElementById('active-count');

            const activeBusIds = Object.keys(allBuses);
            activeCountEl.textContent = activeBusIds.length;

            // Update Dropdown
            const currentOptions = Array.from(busSelect.options).map(o => o.value).filter(v => v);
            activeBusIds.forEach(busId => {
                if (!currentOptions.includes(busId)) {
                    const option = document.createElement('option');
                    option.value = busId;
                    option.text = `Bus ${busId}`;
                    busSelect.appendChild(option);
                }
            });

            // Update List
            busListEl.innerHTML = '';

            if (activeBusIds.length === 0) {
                busListEl.innerHTML = `
                    <div class="text-center py-8">
                        <div class="inline-block p-3 rounded-full bg-academic-50 mb-2">
                            <span class="text-2xl opacity-50">🚌</span>
                        </div>
                        <p class="text-xs text-academic-500 font-medium">No buses active nearby.</p>
                    </div>
                 `;
            }

            activeBusIds.forEach(busId => {
                const bus = allBuses[busId];
                const { lat, lng, route, timestamp } = bus;

                // Update Map Marker
                if (busMarkers[busId]) {
                    busMarkers[busId].setLatLng([lat, lng]);
                    busMarkers[busId].setOpacity(1);
                } else {
                    busMarkers[busId] = L.marker([lat, lng], { icon: busIcon })
                        .bindPopup(`
                            <div class="p-1">
                                <h3 class="font-bold text-academic-900">Bus ${busId}</h3>
                                <p class="text-xs text-academic-600">${route || 'Route Assigned'}</p>
                            </div>
                        `)
                        .addTo(map);
                }

                // Append Card (New Minimal Design)
                const isSelected = selectedBusId === busId;
                const card = document.createElement('div');
                card.className = `
                    p-3 rounded-lg border transition-all cursor-pointer hover:shadow-md
                    ${isSelected ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-academic-100 hover:border-academic-300'}
                `;

                card.onclick = () => focusOnBus(busId);

                // Relative time format helper
                const timeStr = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="h-8 w-8 rounded-full bg-academic-100 flex items-center justify-center text-lg">
                                🚌
                            </div>
                            <div>
                                <h4 class="text-xs font-bold text-academic-800">Bus ${busId}</h4>
                                <p class="text-[10px] text-academic-500 font-medium truncate max-w-[120px]">${route || 'On Route'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                             <div class="flex items-center justify-end gap-1 mb-0.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-500 status-dot"></span>
                                <span class="text-[10px] font-semibold text-green-700">Live</span>
                             </div>
                             <p class="text-[9px] text-academic-400 font-mono">${timeStr}</p>
                        </div>
                    </div>
                `;
                busListEl.appendChild(card);
            });
        }

        function focusOnBus(busId) {
            document.getElementById('bus-select').value = busId;
            selectedBusId = busId;
            if (busMarkers[busId]) {
                map.setView(busMarkers[busId].getLatLng(), 16);
                busMarkers[busId].openPopup();
                renderBuses(); // Re-render to highlight selected card
            }
        }

        function centerMap() {
            const busIds = Object.keys(busMarkers);
            if (busIds.length > 0) {
                map.setView(busMarkers[busIds[0]].getLatLng(), 15);
            } else {
                map.setView([17.4065, 78.4772], 13);
            }
        }

        function refreshTracking() {
            if (socket) {
                socket.disconnect();
                setTimeout(() => socket.connect(), 200);
            }
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Bus Select Listeners
            document.getElementById('bus-select').addEventListener('change', function () {
                if (this.value) focusOnBus(this.value);
            });

            // Location Button
            document.getElementById('show-location-btn').onclick = function () {
                if (navigator.geolocation) {
                    const btn = this;
                    btn.classList.add('animate-pulse');

                    navigator.geolocation.getCurrentPosition(function (pos) {
                        btn.classList.remove('animate-pulse');
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;

                        // Add or update "My Location" marker
                        if (!window.userLocationMarker) {
                            window.userLocationMarker = L.marker([lat, lng], {
                                icon: L.divIcon({
                                    className: 'my-loc-icon',
                                    html: '<div style="background-color:#ef4444; border:2px solid white; width:20px; height:20px; border-radius:50%; box-shadow:0 0 0 4px rgba(239, 68, 68, 0.3);"></div>',
                                    iconSize: [20, 20]
                                })
                            }).addTo(map).bindPopup('You are here');
                        } else {
                            window.userLocationMarker.setLatLng([lat, lng]);
                        }

                        window.userLocationMarker.openPopup();
                        map.setView([lat, lng], 16);
                    }, function () {
                        btn.classList.remove('animate-pulse');
                        alert('Unable to access location.');
                    });
                } else {
                    alert('Geolocation not supported by this browser.');
                }
            };
        });

        // Initialize
        connectToServer();
    </script>
</body>

</html>
